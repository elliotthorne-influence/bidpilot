name: Refresh BidPilot tenders

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # also allows manual "Run workflow" button

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest tenders
        run: node fetch-tenders.js

      - name: Commit updated tenders.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenders.json
          git diff --cached --quiet || git commit -m "chore: refresh tenders.json [skip ci]"
          git push
